  <text x="12" y="19" font-family="'DM Mono', monospace" font-size="13" font-weight="500" fill="#5bc8ff" style="fill:rgb(91, 200, 255);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;DM Mono&quot;, monospace;font-size:13px;font-weight:500;text-anchor:start;dominant-baseline:auto">hsl(0, 100%, 68%)</text>
