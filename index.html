<!DOCTYPE html>
<html lang="es">

<head>
    
    <meta charset="UTF-8">
    
    <meta name="viewport"   content="width=device-width, initial-scale=1.0">
    
    <title>Palette Generator</title>
    
    <link rel="stylesheet" href="css/styles.css">

</head>

<body>

    <!-- TITULO -->

    <header class="header">

    <div class="logo">

        <img src="img/logo.svg" alt="Logo Palette Generator">

    </div>

    <div class="titulo-header">

        <h1>Palette Generator</h1>

        <p>Crea paletas modernas y aleatorias</p>

    </div>

    </header>

    <h2>Generador</h2>

    <!-- BOTONES -->

    <section class="controles">

        <button data-cantidad="6" onclick="generate(6)">6 colores</button>
        <button data-cantidad="8" onclick="generate(8)">8 colores</button>
        <button data-cantidad="9" onclick="generate(9)">9 
        colores</button>  


    </section>

    <h2>Formato</h2>    

    <section class="formatos">
        <button class="btn-formato "data-formato="hex" onclick="cambiarFormato('hex', this)">HEX</button>


        <button class="btn-formato"        data-formato="hsl" onclick="cambiarFormato('hsl', this)">HSL</button>

</section>

    <!-- CONTENEDOR COLORES -->

    <main class="paleta">

        <div class="color">

        </div>

        <div class="color">

        </div>

        <div class="color">

        </div>

        <div class="color">

        </div>

        <div class="color">

        </div>

        <div class="color"> 
        </div>

    </main>


<footer>
    <p>&copy; 2026 Generador paletas de colores. Todos los derechos reservados.</p>
</footer>

<div id="toast"></div>

<script src="js/script.js"></script>

</body>


</html>
