<!DOCTYPE html>
<html lang="es">

<head>
    
    <meta charset="UTF-8">
    
    <meta name="viewport"   content="width=device-width, initial-scale=1.0">
    
    <title>Palette Generator</title>
    
    <link rel="stylesheet" href="css/styles.css">

</head>

<body>

    <header class="header">

    <div class="logo">

        <img src="img/logo.svg" alt="Logo Palette Generator">

    </div>

    <div class="titulo-header">

        <h1>Palette Generator</h1>

        <p>Crea paletas modernas y aleatorias</p>

    </div>

    </header>

    <h2>Generador</h2>


<section class="controles">

    <select id="cantidadColores">
        <option value="6">6 colores</option>
        <option value="8">8 colores</option>
        <option value="9">9 colores</option>
    </select>

<button 

    class="btn-generar"                     onclick="generarDesdeSelect()">
    🎨 Generar

</button>

</section>

    <h2>Formato</h2>    

    <section class="formatos">
        <button class="btn-formato "data-formato="hex" onclick="cambiarFormato('hex', this)">HEX</button>


        <button class="btn-formato"        data-formato="hsl" onclick="cambiarFormato('hsl', this)">HSL</button>

</section>


<section class="acciones">

    <input 
        type="text"
        id="nombrePaleta"
        placeholder="Nombre de la paleta"
    >

    <button onclick="guardarPaleta()">
        
        ❤️ Guardar Paleta

    </button>

</section>
    
<main class="paleta">
    
</main>


<section class="guardadas">

    <h2>❤️ Paletas Guardadas</h2>

    <button class="btn-reset" onclick="resetearPaletas()">
        ♻️ Resetear Paletas
    </button>

    <div id="listaGuardadas"></div>

</section>


<footer>
    <p>&copy; 2026 Generador paletas de colores. Todos los derechos reservados.</p>
</footer>

<div id="toast"></div>

<script src="js/script.js"></script>

</body>


</html>
